<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Permanent+Marker&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --glow-color: rgba(255,255,255,0.1);
            --glow-color-soft: rgba(255,255,255,0.03);
            --glow-shimmer: rgba(255,255,255,0.15);
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh; color: white;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; overflow-x: hidden;
            background: #0a0a0a;
            position: relative;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0); pointer-events: none; z-index: 0;
            transition: background 0.5s;
        }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute; width: 3px; height: 3px;
            border-radius: 50%; animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        .container { position: relative; z-index: 1; max-width: 500px; width: 100%; text-align: center; }
        .profile-card {
            position: relative;
            border-radius: 24px; padding: 40px 30px 55px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeInUp 0.8s ease;
            background: rgba(20,20,20,0.85);
            transition: background 0.3s, backdrop-filter 0.3s;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .avatar-wrapper {
            position: relative; display: inline-block; margin-bottom: 8px;
        }
        .avatar-ring {
            position: absolute; top: -12px; left: -12px; right: -12px; bottom: -12px;
            border-radius: 50%; pointer-events: none;
            opacity: 0; transition: opacity 0.5s;
        }
        .avatar-ring.active { opacity: 1; }
        .avatar-ring.fire {
            border: 3px solid transparent;
            animation: fireRing 1s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255,69,0,0.6), inset 0 0 30px rgba(255,69,0,0.3);
        }
        @keyframes fireRing {
            0%,100% { border-color: #ff4500; transform: scale(1); }
            50% { border-color: #ff8c00; transform: scale(1.05); }
        }
        .avatar-ring.sparkle {
            border: 2px dashed #fff;
            animation: sparkleRing 2s linear infinite;
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
        }
        @keyframes sparkleRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .avatar-ring.neon {
            border: 3px solid #00aaff;
            animation: neonPulse 1.5s ease-in-out infinite;
            box-shadow: 0 0 30px #00aaff, 0 0 60px #00aaff44;
        }
        @keyframes neonPulse {
            0%,100% { box-shadow: 0 0 20px #00aaff, 0 0 40px #00aaff33; }
            50% { box-shadow: 0 0 40px #00aaff, 0 0 80px #00aaff55; }
        }
        .avatar-ring.glow {
            border: 2px solid rgba(255,255,255,0.3);
            animation: glowPulse 2s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255,255,255,0.15);
        }
        @keyframes glowPulse {
            0%,100% { box-shadow: 0 0 20px rgba(255,255,255,0.1); }
            50% { box-shadow: 0 0 50px rgba(255,255,255,0.3); }
        }
        .avatar {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3); object-fit: cover;
            transition: all 0.3s; position: relative; z-index: 1;
        }
        .avatar:hover { transform: scale(1.05); }
        .badge {
            position: absolute; bottom: 5px; right: 5px;
            color: white; width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; border: 2px solid #0a0a0a; z-index: 2;
            animation: pulse 2s infinite;
        }
        .badge.hidden { display: none; }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 15px rgba(0,150,255,0.5); }
            50% { box-shadow: 0 0 30px rgba(0,150,255,0.8); }
        }
        .name-container { margin-bottom: 2px; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .name-emoji { font-size: 24px; display: inline-block; transition: transform 0.3s; }
        .name-emoji.d3 {
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2), 2px 2px 0 rgba(0,0,0,0.25), 3px 3px 4px rgba(0,0,0,0.35);
            transform: perspective(200px) rotateY(-18deg) rotateX(6deg);
            display: inline-block;
        }
        .name-emoji.d3:hover { transform: perspective(200px) rotateY(0deg) rotateX(0deg) scale(1.1); }
        .name-badge-3d {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%; color: #fff;
            font-size: 12px; flex-shrink: 0;
            box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.5), inset 0 -2px 2px rgba(0,0,0,0.3);
            transform: perspective(120px) rotateX(12deg) rotateY(-8deg);
            transition: transform 0.3s;
        }
        .name-badge-3d:hover { transform: perspective(120px) rotateX(0deg) rotateY(0deg) scale(1.1); }
        .name {
            font-size: 28px; font-weight: 700; letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff, #cccccc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .bio-text { color: #aaa; font-size: 14px; margin-bottom: 10px; line-height: 1.5; }
        .status-line {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            font-size: 13px; color: #bbb; opacity: 0.9; margin-bottom: 22px;
        }
        .status-line.hidden { display: none; }
        .status-icon-svg {
            width: 18px; height: 18px; display: inline-block;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));
        }
        .links { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 16px; }
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            width: 54px; height: 54px; border-radius: 50%;
            color: white; text-decoration: none;
            font-size: 22px; transition: all 0.3s;
            position: relative;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .link-btn:hover { transform: translateY(-3px) scale(1.08); }
        .link-btn.glow-border {
            box-shadow: 0 0 12px var(--glow-color), 0 0 24px var(--glow-color-soft);
        }
        .link-btn.glow-active {
            animation: iconPulse 2.6s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 0 10px var(--glow-color), 0 0 20px var(--glow-color-soft); }
            50% { box-shadow: 0 0 20px var(--glow-shimmer), 0 0 34px var(--glow-color); }
        }
        .link-icon { line-height: 1; }
        .no-links-text { opacity: 0.5; font-size: 13px; }
        .music-player {
            margin-top: 20px; border-radius: 16px; padding: 15px 20px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeInUp 1s ease;
            background: rgba(20,20,20,0.9);
            flex-wrap: wrap;
        }
        .music-player.hidden { display: none; }
        .music-cover {
            width: 50px; height: 50px; border-radius: 50%; object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
            animation: spin 4s linear infinite; animation-play-state: paused;
            flex-shrink: 0;
        }
        .music-cover.playing { animation-play-state: running; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .music-info { flex: 1; text-align: left; min-width: 100px; }
        .music-title { font-size: 13px; font-weight: 600; }
        .music-artist { font-size: 11px; color: #888; }
        .music-controls {
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }
        .music-controls button {
            background: rgba(255,255,255,0.1); border: none; border-radius: 50%;
            width: 32px; height: 32px; color: white; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .music-controls button:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .music-seek {
            flex: 1; min-width: 80px; height: 4px; -webkit-appearance: none;
            background: rgba(255,255,255,0.2); border-radius: 4px; outline: none;
        }
        .music-seek::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            border-radius: 50%; background: #ff4444; cursor: pointer;
        }
        .view-count {
            display: inline-flex; align-items: center; gap: 5px;
            background: transparent; padding: 6px 14px;
            border-radius: 20px; font-size: 12px; color: #999;
            margin-top: 8px;
        }
        @media (max-width: 480px) {
            .profile-card { padding: 30px 20px 50px; }
            .name { font-size: 24px; }
            .avatar { width: 85px; height: 85px; }
            .music-player { padding: 12px 15px; }
            .music-controls button { width: 28px; height: 28px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="bg-overlay" id="bgOverlay"></div>
    <div class="particles" id="particles"></div>
    <div class="container">
        <div class="profile-card" id="profileCard">
            <div class="avatar-wrapper">
                <div class="avatar-ring" id="avatarRing"></div>
                <img class="avatar" id="avatar" src="https://i.imgur.com/default.png" alt="Avatar">
                <div class="badge" id="badge">✓</div>
            </div>
            <div class="name-container">
                <span class="name-emoji" id="nameEmojiLeft"></span>
                <h1 class="name" id="nameDisplay">Yükleniyor...</h1>
                <span class="name-emoji" id="nameEmojiRight"></span>
            </div>
            <p class="bio-text" id="bioDisplay">Yükleniyor...</p>
            <div class="status-line hidden" id="statusLine">
                <span id="statusIcon"></span><span id="statusText"></span>
            </div>
            <div class="links" id="linksContainer"></div>
        </div>
        <div class="view-count" id="viewCountWrap">👁 <span id="viewCount">0</span></div>
        <div class="music-player hidden" id="musicPlayer">
            <img class="music-cover" id="musicCover" src="https://i.imgur.com/default.png" alt="cover">
            <div class="music-info">
                <div class="music-title" id="musicTitle">Müzik</div>
                <div class="music-artist" id="musicArtist">Sanatçı</div>
            </div>
            <div class="music-controls">
                <button id="musicPlayBtn" title="Çal/Durdur">⏸</button>
                <input type="range" class="music-seek" id="musicSeek" min="0" max="100" value="0">
            </div>
        </div>
    </div>
    <audio id="bgMusic" loop style="display:none;"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNnqSKYVW_JMc4CO5KoNQb4ctrMdIMS6s",
            authDomain: "rolex-bio.firebaseapp.com",
            projectId: "rolex-bio",
            storageBucket: "rolex-bio.firebasestorage.app",
            messagingSenderId: "182739949955",
            appId: "1:182739949955:web:bd859e25ceee8936273eb6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function glowShadow(colorStr, intensity) {
            const gi = (intensity !== undefined && intensity !== null) ? intensity / 100 : 0;
            if (!gi) return 'none';
            const c = colorStr || '255,255,255';
            return `0 0 ${(gi * 14).toFixed(0)}px rgba(${c},${(gi * 0.85).toFixed(2)})`;
        }

        // Müzik kontrolleri için değişkenler
        let audio = document.getElementById('bgMusic');
        let playBtn = document.getElementById('musicPlayBtn');
        let seekBar = document.getElementById('musicSeek');
        let isUserSeeking = false;

        // Seek bar güncelleme
        audio.addEventListener('timeupdate', () => {
            if (!isUserSeeking && audio.duration) {
                seekBar.value = (audio.currentTime / audio.duration) * 100;
            }
        });

        seekBar.addEventListener('input', () => {
            isUserSeeking = true;
            if (audio.duration) {
                audio.currentTime = (seekBar.value / 100) * audio.duration;
            }
        });
        seekBar.addEventListener('change', () => {
            isUserSeeking = false;
        });

        // Play/Pause
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(() => {});
                playBtn.textContent = '⏸';
            } else {
                audio.pause();
                playBtn.textContent = '▶';
            }
        });

        audio.addEventListener('play', () => {
            playBtn.textContent = '⏸';
            document.getElementById('musicCover').classList.add('playing');
        });
        audio.addEventListener('pause', () => {
            playBtn.textContent = '▶';
            document.getElementById('musicCover').classList.remove('playing');
        });
        audio.addEventListener('ended', () => {
            document.getElementById('musicCover').classList.remove('playing');
            playBtn.textContent = '▶';
        });

        // Ana veri akışı
        db.collection("bio").doc("profile").onSnapshot((doc) => {
            if (!doc.exists) return;
            const d = doc.data();

            // İsim
            document.getElementById('nameDisplay').textContent = d.name || 'İsimsiz';
            document.getElementById('nameDisplay').style.fontSize = (d.nameSize || 28) + 'px';

            const bioEl = document.getElementById('bioDisplay');
            bioEl.textContent = d.bio || '';
            bioEl.style.color = d.bioColor || '#aaaaaa';
            bioEl.style.textShadow = glowShadow(d.bioGlowColor, d.bioGlowIntensity);
            bioEl.style.fontSize = (d.bioSize || 14) + 'px';

            document.getElementById('avatar').src = d.avatar || 'https://i.imgur.com/default.png';

            // Avatar Efekti
            const ring = document.getElementById('avatarRing');
            ring.className = 'avatar-ring';
            if (d.avatarEffect && d.avatarEffect !== 'none') {
                ring.classList.add('active', d.avatarEffect);
            }

            // Emojiler 3D / İsim yanı rozet
            const el = document.getElementById('nameEmojiLeft');
            const er = document.getElementById('nameEmojiRight');
            const nameBadgeOn = d.nameBadge === true;
            const nameBadgePos = d.nameBadgePosition || 'right';
            const badgeIconVal = d.badgeIcon || '✓';
            const badgeColorVal = d.badgeColor || 'linear-gradient(135deg, #1da1f2, #0d8bd9)';
            const badgeHTML = `<span class="name-badge-3d" style="background:${badgeColorVal}">${badgeIconVal}</span>`;

            if (nameBadgeOn && nameBadgePos === 'left') {
                el.innerHTML = badgeHTML;
            } else {
                el.innerHTML = '';
                el.textContent = d.emojiLeft || '';
            }
            if (nameBadgeOn && nameBadgePos === 'right') {
                er.innerHTML = badgeHTML;
            } else {
                er.innerHTML = '';
                er.textContent = d.emojiRight || '';
            }
            el.className = 'name-emoji' + (d.emoji3d ? ' d3' : '');
            er.className = 'name-emoji' + (d.emoji3d ? ' d3' : '');

            document.title = (d.name || 'Bio') + ' | Bio';

            // Rozet
            const badge = document.getElementById('badge');
            if (d.showBadge === false) badge.classList.add('hidden');
            else { badge.classList.remove('hidden');
                badge.textContent = d.badgeIcon || '✓';
                badge.style.background = d.badgeColor || 'linear-gradient(135deg, #1da1f2, #0d8bd9)'; }

            // Saydamlık (kart) - 0 olduğunda tamamen görünmez
            const cardOpacity = (d.cardOpacity !== undefined && d.cardOpacity !== null) ? d.cardOpacity : 0.85;
            const cardBlur = (d.cardBlur !== undefined && d.cardBlur !== null) ? d.cardBlur : 20;
            const card = document.getElementById('profileCard');
            if (cardOpacity === 0) {
                card.style.background = 'transparent';
                card.style.backdropFilter = 'none';
                card.style.webkitBackdropFilter = 'none';
                card.style.border = 'none';
            } else {
                card.style.background = `rgba(20,20,20,${cardOpacity})`;
                card.style.backdropFilter = `blur(${cardBlur}px)`;
                card.style.webkitBackdropFilter = `blur(${cardBlur}px)`;
                card.style.border = '1px solid rgba(255,255,255,0.1)';
            }

            // Gece Modu (Overlay)
            const overlay = document.getElementById('bgOverlay');
            const overlayVal = (d.bgOverlay !== undefined && d.bgOverlay !== null) ? d.bgOverlay : 0;
            overlay.style.background = `rgba(0,0,0,${overlayVal / 100})`;

            // İsim efekti
            const nameEl = document.getElementById('nameDisplay');
            nameEl.style.background = d.nameGradient || 'linear-gradient(135deg, #ffffff, #cccccc)';
            nameEl.style.webkitBackgroundClip = 'text';
            nameEl.style.webkitTextFillColor = 'transparent';
            nameEl.style.backgroundClip = 'text';
            nameEl.style.textShadow = d.nameGlow || 'none';
            nameEl.style.filter = d.nameNeon ? `drop-shadow(0 0 ${d.neonSize || 10}px ${d.neonColor || '#fff'})` : 'none';
            nameEl.style.fontFamily = d.nameFont || "'Segoe UI', system-ui, -apple-system, sans-serif";

            // Durum satırı (3D Konum İkonu)
            const statusLine = document.getElementById('statusLine');
            if (d.statusText) {
                statusLine.classList.remove('hidden');
                const iconSpan = document.getElementById('statusIcon');
                // 3D SVG Konum İkonu
                iconSpan.innerHTML = `
                    <svg class="status-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" fill="currentColor" />
                    </svg>
                `;
                document.getElementById('statusText').textContent = d.statusText;
                statusLine.style.color = d.statusColor || '#bbbbbb';
                statusLine.style.textShadow = glowShadow(d.statusGlowColor, d.statusGlowIntensity);
            } else {
                statusLine.classList.add('hidden');
            }

            // Arka plan
            document.body.style.background = d.bgImage ? `url(${d.bgImage}) center/cover no-repeat fixed` : (d.bgColor || '#0a0a0a');
            document.body.style.backgroundColor = d.bgColor || '#0a0a0a';

            // Buton parlama rengi/şiddeti
            const gi = (d.btnGlowIntensity !== undefined && d.btnGlowIntensity !== null ? d.btnGlowIntensity : 40) / 100;
            const gc = d.btnGlowColor || '255,255,255';
            document.documentElement.style.setProperty('--glow-color', `rgba(${gc},${(0.4 * gi).toFixed(2)})`);
            document.documentElement.style.setProperty('--glow-color-soft', `rgba(${gc},${(0.12 * gi).toFixed(2)})`);
            document.documentElement.style.setProperty('--glow-shimmer', `rgba(${gc},${(0.3 * gi).toFixed(2)})`);

            // Telegram özel parlaklık
            const tgColor = d.telegramGlowColor || '0,136,204';
            const tgIntensity = (d.telegramGlowIntensity || 60) / 100;

            // Görüntülenme sayacı renk/parlama
            const viewCountWrap = document.getElementById('viewCountWrap');
            viewCountWrap.style.color = d.viewColor || '#999999';
            viewCountWrap.style.textShadow = glowShadow(d.viewGlowColor, d.viewGlowIntensity);

            // Partikül
            const pc = document.getElementById('particles');
            pc.innerHTML = '';
            if (d.particles !== false) {
                const count = d.particleCount || 40;
                const color = d.particleColor || 'rgba(255,255,255,0.5)';
                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div');
                    p.classList.add('particle');
                    p.style.left = Math.random() * 100 + '%';
                    p.style.animationDuration = (Math.random() * 10 + 5) + 's';
                    p.style.animationDelay = Math.random() * 5 + 's';
                    p.style.background = color;
                    pc.appendChild(p);
                }
            }

            // Linkler
            const lc = document.getElementById('linksContainer');
            lc.innerHTML = '';
            const btnGlow = d.btnGlow !== false;
            const btnShimmer = d.btnShimmer !== false;
            if (d.links && d.links.length > 0) {
                d.links.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.title = link.title || '';
                    a.className = 'link-btn';
                    if (btnGlow) a.classList.add('glow-border');
                    if (btnShimmer) a.classList.add('glow-active');
                    if (d.btnBgColor) a.style.background = d.btnBgColor;
                    if (d.btnBorderColor) a.style.borderColor = d.btnBorderColor;

                    // Şablona özel marka rengi
                    if (link.color) {
                        // Telegram özel parlaklık
                        if (link.brand === 'telegram') {
                            a.style.setProperty('--glow-color', `rgba(${tgColor},${tgIntensity * 0.6})`);
                            a.style.setProperty('--glow-color-soft', `rgba(${tgColor},${tgIntensity * 0.2})`);
                            a.style.setProperty('--glow-shimmer', `rgba(${tgColor},${tgIntensity * 0.5})`);
                        } else {
                            a.style.setProperty('--glow-color', `rgba(${link.color},0.5)`);
                            a.style.setProperty('--glow-color-soft', `rgba(${link.color},0.15)`);
                            a.style.setProperty('--glow-shimmer', `rgba(${link.color},0.45)`);
                        }
                        if (!d.btnBorderColor) a.style.borderColor = `rgba(${link.color},0.5)`;
                    }

                    if (d.btnHoverColor) {
                        a.onmouseenter = () => {
                            a.style.background = d.btnHoverColor;
                            a.style.borderColor = d.btnHoverBorder || d.btnHoverColor;
                        };
                        a.onmouseleave = () => {
                            a.style.background = d.btnBgColor || 'rgba(255,255,255,0.06)';
                            a.style.borderColor = d.btnBorderColor || (link.color ? `rgba(${link.color},0.5)` : 'rgba(255,255,255,0.15)');
                        };
                    }
                    const iconHTML = link.brand
                        ? `<i class="bi bi-${link.brand}"></i>`
                        : `<span class="link-icon">${link.icon || '🔗'}</span>`;
                    a.innerHTML = iconHTML;
                    lc.appendChild(a);
                });
            } else {
                lc.innerHTML = '<p class="no-links-text">Henüz link eklenmedi</p>';
            }

            // Müzik
            const mp = document.getElementById('musicPlayer');
            if (d.musicUrl) {
                mp.classList.remove('hidden');
                const musicOpacity = (d.musicOpacity !== undefined && d.musicOpacity !== null) ? d.musicOpacity : 0.9;
                const musicBlur = (d.musicBlur !== undefined && d.musicBlur !== null) ? d.musicBlur : 10;
                if (musicOpacity === 0) {
                    mp.style.background = 'transparent';
                    mp.style.backdropFilter = 'none';
                    mp.style.webkitBackdropFilter = 'none';
                    mp.style.border = 'none';
                } else {
                    mp.style.background = `rgba(20,20,20,${musicOpacity})`;
                    mp.style.backdropFilter = `blur(${musicBlur}px)`;
                    mp.style.webkitBackdropFilter = `blur(${musicBlur}px)`;
                    mp.style.border = '1px solid rgba(255,255,255,0.1)';
                }
                document.getElementById('musicTitle').textContent = d.musicTitle || 'Müzik';
                document.getElementById('musicArtist').textContent = d.musicArtist || '';
                document.getElementById('musicCover').src = d.musicCover || 'https://i.imgur.com/default.png';

                // Müzik değiştiyse yeniden yükle
                if (audio.src !== d.musicUrl) {
                    audio.src = d.musicUrl;
                    audio.load();
                    // Otomatik çal
                    if (d.musicAutoplay !== false) {
                        audio.play().catch(() => {
                            // Tarayıcı otomatik çalmayı engellerse butona basmasını bekle
                            playBtn.textContent = '▶';
                        });
                    } else {
                        audio.pause();
                        playBtn.textContent = '▶';
                    }
                }
            } else {
                mp.classList.add('hidden');
                audio.pause();
                audio.src = '';
            }
        });

        // Sayaç
        const viewRef = db.collection("bio").doc("views");
        viewRef.get().then((doc) => {
            let count = doc.exists ? (doc.data().count || 0) : 0;
            count++;
            viewRef.set({ count: count });
            document.getElementById('viewCount').textContent = count;
            viewRef.onSnapshot((d) => {
                if (d.exists) document.getElementById('viewCount').textContent = d.data().count || 0;
            });
        });
    </script>
</body>
</html>
