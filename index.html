<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolex | Bio</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Permanent+Marker&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --glow-color: rgba(255,255,255,0.1);
            --glow-color-soft: rgba(255,255,255,0.03);
            --glow-shimmer: rgba(255,255,255,0.15);
        }
        
        /* ============ GİRİŞ EKRANI - SADE ============ */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            cursor: pointer;
            overflow: hidden;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        #splashScreen.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }
        
        /* Yıldırım Efektleri */
        .lightning-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .lightning {
            position: absolute;
            background: white;
            opacity: 0;
            border-radius: 2px;
            animation: lightningFlash 3s ease-in-out infinite;
        }
        .lightning:nth-child(1) {
            top: 10%;
            left: 15%;
            width: 2px;
            height: 120px;
            animation-delay: 0.2s;
            box-shadow: 0 0 20px #fff, 0 0 40px #4488ff, 0 0 60px #4488ff44;
        }
        .lightning:nth-child(2) {
            top: 20%;
            right: 20%;
            width: 2px;
            height: 80px;
            animation-delay: 1.2s;
            box-shadow: 0 0 20px #fff, 0 0 40px #ff4488, 0 0 60px #ff448844;
        }
        .lightning:nth-child(3) {
            bottom: 30%;
            left: 25%;
            width: 2px;
            height: 100px;
            animation-delay: 2.2s;
            box-shadow: 0 0 20px #fff, 0 0 40px #44ff88, 0 0 60px #44ff8844;
        }
        .lightning:nth-child(4) {
            top: 40%;
            right: 30%;
            width: 2px;
            height: 90px;
            animation-delay: 0.8s;
            box-shadow: 0 0 20px #fff, 0 0 40px #ffaa44, 0 0 60px #ffaa4444;
        }
        .lightning:nth-child(5) {
            bottom: 15%;
            right: 15%;
            width: 2px;
            height: 70px;
            animation-delay: 1.8s;
            box-shadow: 0 0 20px #fff, 0 0 40px #aa44ff, 0 0 60px #aa44ff44;
        }
        .lightning:nth-child(6) {
            top: 50%;
            left: 5%;
            width: 2px;
            height: 60px;
            animation-delay: 2.8s;
            box-shadow: 0 0 20px #fff, 0 0 40px #ff4488, 0 0 60px #ff448844;
        }
        .lightning:nth-child(7) {
            top: 5%;
            left: 50%;
            width: 2px;
            height: 100px;
            animation-delay: 0.5s;
            box-shadow: 0 0 20px #fff, 0 0 40px #88ff44, 0 0 60px #88ff4444;
        }
        .lightning:nth-child(8) {
            bottom: 5%;
            left: 40%;
            width: 2px;
            height: 80px;
            animation-delay: 1.5s;
            box-shadow: 0 0 20px #fff, 0 0 40px #4488ff, 0 0 60px #4488ff44;
        }
        
        @keyframes lightningFlash {
            0%, 90%, 100% { opacity: 0; transform: scaleY(0.3); }
            92% { opacity: 1; transform: scaleY(1); }
            94% { opacity: 0; transform: scaleY(0.5); }
            96% { opacity: 1; transform: scaleY(1); }
            98% { opacity: 0.5; transform: scaleY(0.8); }
        }
        
        .flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.1), transparent 70%);
            pointer-events: none;
            opacity: 0;
            animation: flashPulse 4s ease-in-out infinite;
        }
        @keyframes flashPulse {
            0%, 90%, 100% { opacity: 0; }
            92% { opacity: 1; }
            94% { opacity: 0; }
            96% { opacity: 0.5; }
            98% { opacity: 0; }
        }
        
        /* Giriş Ekranı İçerik - SADE */
        .splash-content {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeInSplash 1.5s ease;
        }
        @keyframes fadeInSplash {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .splash-logo {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff6b00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(255,215,0,0.2);
            letter-spacing: 4px;
            font-family: 'Bungee', cursive;
            margin-bottom: 5px;
        }
        .splash-logo small {
            font-size: 14px;
            display: block;
            color: rgba(255,255,255,0.3);
            -webkit-text-fill-color: rgba(255,255,255,0.3);
            letter-spacing: 6px;
            margin-top: 2px;
            font-weight: 300;
        }
        
        .splash-click {
            display: inline-block;
            padding: 12px 32px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            margin-top: 15px;
        }
        .splash-click:hover {
            transform: scale(1.03);
            border-color: rgba(255,255,255,0.25);
            color: #fff;
            background: rgba(255,255,255,0.06);
        }
        .splash-click:active {
            transform: scale(0.95);
        }
        
        .splash-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 4px;
            margin-top: 20px;
            font-weight: 300;
        }

        /* ============ ANA SAYFA ============ */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh; color: white;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; overflow-x: hidden;
            background: #0a0a0a;
            position: relative;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0); pointer-events: none; z-index: 0;
            transition: background 0.5s;
        }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute; width: 3px; height: 3px;
            border-radius: 50%; animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        .container { position: relative; z-index: 1; max-width: 520px; width: 100%; text-align: center; }
        .profile-card {
            position: relative;
            border-radius: 24px; padding: 30px 25px 45px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeInUp 0.8s ease;
            background: rgba(20,20,20,0.88);
            transition: background 0.3s, backdrop-filter 0.3s, border 0.3s;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* AVATAR - Gri yuvarlak kaldırıldı, aşağı kaydırıldı */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            width: 100px;
            height: 100px;
            margin-bottom: 5px;
            border-radius: 50%;
        }
        
        .avatar-ring {
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .avatar-ring.active { opacity: 1; }

        .avatar-ring.fire {
            border: 3px solid transparent;
            animation: fireRing 0.8s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255,69,0,0.4), inset 0 0 30px rgba(255,69,0,0.2);
        }
        @keyframes fireRing {
            0%,100% { border-color: #ff4500; transform: scale(1) rotate(0deg); }
            25% { border-color: #ff8c00; transform: scale(1.04) rotate(5deg); }
            50% { border-color: #ffd700; transform: scale(1.08) rotate(-5deg); }
            75% { border-color: #ff4500; transform: scale(1.04) rotate(5deg); }
        }
        .avatar-ring.sparkle {
            border: 2px dashed #fff;
            animation: sparkleRing 1.5s linear infinite;
            box-shadow: 0 0 20px rgba(255,255,255,0.2), 0 0 60px rgba(255,215,0,0.15);
        }
        @keyframes sparkleRing {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.06); box-shadow: 0 0 30px rgba(255,215,0,0.3); }
            50% { transform: rotate(180deg) scale(1); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
            75% { transform: rotate(270deg) scale(1.06); box-shadow: 0 0 40px rgba(255,215,0,0.3); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .avatar-ring.neon {
            border: 3px solid #00aaff;
            animation: neonPulse 1.2s ease-in-out infinite;
            box-shadow: 0 0 20px #00aaff, 0 0 40px #00aaff44;
        }
        @keyframes neonPulse {
            0%,100% { border-color: #00aaff; box-shadow: 0 0 20px #00aaff, 0 0 40px #00aaff33; transform: scale(1); }
            25% { border-color: #ff00ff; box-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff33; transform: scale(1.03); }
            50% { border-color: #00ffaa; box-shadow: 0 0 20px #00ffaa, 0 0 40px #00ffaa33; transform: scale(1); }
            75% { border-color: #ff00ff; box-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff33; transform: scale(1.03); }
        }
        .avatar-ring.glow {
            border: 2px solid rgba(255,255,255,0.3);
            animation: glowWave 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        @keyframes glowWave {
            0%,100% { border-color: rgba(255,255,255,0.3); box-shadow: 0 0 20px rgba(255,255,255,0.1); transform: scale(1); }
            25% { border-color: rgba(255,100,100,0.5); box-shadow: 0 0 40px rgba(255,100,100,0.2); transform: scale(1.02); }
            50% { border-color: rgba(100,100,255,0.5); box-shadow: 0 0 40px rgba(100,100,255,0.2); transform: scale(1); }
            75% { border-color: rgba(100,255,100,0.5); box-shadow: 0 0 40px rgba(100,255,100,0.2); transform: scale(1.02); }
        }
        .avatar-ring.pulse {
            border: 3px solid #ff0080;
            animation: pulseBeat 1s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255,0,128,0.3);
        }
        @keyframes pulseBeat {
            0%,100% { transform: scale(1); border-color: #ff0080; box-shadow: 0 0 20px rgba(255,0,128,0.3); }
            25% { transform: scale(1.08); border-color: #ff4400; box-shadow: 0 0 50px rgba(255,68,0,0.5); }
            50% { transform: scale(1); border-color: #ff0080; box-shadow: 0 0 20px rgba(255,0,128,0.3); }
            75% { transform: scale(1.08); border-color: #ff4400; box-shadow: 0 0 50px rgba(255,68,0,0.5); }
        }
        .avatar-ring.rainbow {
            border: 3px solid transparent;
            animation: rainbowRing 2s linear infinite;
            box-shadow: 0 0 30px rgba(255,255,255,0.15);
        }
        @keyframes rainbowRing {
            0% { border-color: #ff0000; transform: rotate(0deg) scale(1); }
            17% { border-color: #ff8800; transform: rotate(60deg) scale(1.04); }
            33% { border-color: #ffff00; transform: rotate(120deg) scale(1); }
            50% { border-color: #00ff00; transform: rotate(180deg) scale(1.04); }
            67% { border-color: #0088ff; transform: rotate(240deg) scale(1); }
            83% { border-color: #8800ff; transform: rotate(300deg) scale(1.04); }
            100% { border-color: #ff0000; transform: rotate(360deg) scale(1); }
        }
        .avatar-ring.laser {
            border: 2px solid #ff0000;
            animation: laserScan 1.5s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255,0,0,0.3), 0 0 60px rgba(255,0,0,0.1);
        }
        @keyframes laserScan {
            0%,100% { border-color: #ff0000; transform: scale(1) rotate(0deg); box-shadow: 0 0 20px rgba(255,0,0,0.3); }
            25% { border-color: #00ff00; transform: scale(1.05) rotate(90deg); box-shadow: 0 0 40px rgba(0,255,0,0.4); }
            50% { border-color: #0088ff; transform: scale(1) rotate(180deg); box-shadow: 0 0 20px rgba(0,136,255,0.3); }
            75% { border-color: #ff00ff; transform: scale(1.05) rotate(270deg); box-shadow: 0 0 40px rgba(255,0,255,0.4); }
        }
        .avatar-ring.galaxy {
            border: 2px solid #8b00ff;
            animation: galaxySpin 3s linear infinite;
            box-shadow: 0 0 30px rgba(139,0,255,0.2), 0 0 60px rgba(139,0,255,0.1);
            background: radial-gradient(circle at 30% 30%, rgba(139,0,255,0.15), transparent 60%);
        }
        @keyframes galaxySpin {
            0% { transform: rotate(0deg) scale(1); border-color: #8b00ff; }
            25% { transform: rotate(90deg) scale(1.04); border-color: #00bfff; }
            50% { transform: rotate(180deg) scale(1); border-color: #ff69b4; }
            75% { transform: rotate(270deg) scale(1.04); border-color: #00bfff; }
            100% { transform: rotate(360deg) scale(1); border-color: #8b00ff; }
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none; /* Gri yuvarlak kaldırıldı */
            object-fit: cover;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }
        .avatar:hover { transform: scale(1.05); }

        .badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid #0a0a0a;
            z-index: 2;
            animation: pulse 2s infinite;
        }
        .badge.hidden { display: none; }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 15px rgba(0,150,255,0.5); }
            50% { box-shadow: 0 0 30px rgba(0,150,255,0.8); }
        }

        .name-container { 
            margin-bottom: 2px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            flex-wrap: wrap; 
            margin-top: 2px; /* Fotoğrafa yaklaştır */
        }
        .name-emoji { font-size: 26px; display: inline-block; transition: transform 0.3s; }
        .name-emoji.d3 {
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2), 2px 2px 0 rgba(0,0,0,0.25), 3px 3px 4px rgba(0,0,0,0.35);
            transform: perspective(200px) rotateY(-18deg) rotateX(6deg);
            display: inline-block;
        }
        .name-emoji.d3:hover { transform: perspective(200px) rotateY(0deg) rotateX(0deg) scale(1.1); }
        .name-badge-3d {
            display: inline-flex; align-items: center; justify-content: center;
            width: 24px; height: 24px; border-radius: 50%; color: #fff;
            font-size: 13px; flex-shrink: 0;
            box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.5), inset 0 -2px 2px rgba(0,0,0,0.3);
            transform: perspective(120px) rotateX(12deg) rotateY(-8deg);
            transition: transform 0.3s;
        }
        .name-badge-3d:hover { transform: perspective(120px) rotateX(0deg) rotateY(0deg) scale(1.1); }
        .name {
            font-size: 32px; font-weight: 700; letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff, #cccccc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .bio-text { color: #aaa; font-size: 14px; margin-bottom: 8px; line-height: 1.5; }
        .status-line {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            font-size: 13px; color: #bbb; opacity: 0.9; margin-bottom: 18px;
        }
        .status-line.hidden { display: none; }
        .status-icon-svg {
            width: 18px; height: 18px; display: inline-block;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));
        }
        
        /* LİNKLER - Telegram özel */
        .links { 
            display: flex; 
            flex-direction: row; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
        }
        .link-btn {
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 54px; 
            height: 54px; 
            border-radius: 50%;
            color: white; 
            text-decoration: none;
            font-size: 22px; 
            transition: all 0.3s;
            position: relative;
            background: transparent; /* Arka plan kaldırıldı */
            border: none; /* Kenarlık kaldırıldı */
        }
        .link-btn:hover { 
            transform: translateY(-3px) scale(1.1); 
        }
        
        /* Telegram özel - Büyük ve sade */
        .link-btn.telegram-link {
            width: 72px;
            height: 72px;
            font-size: 44px;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: #ffffff;
            filter: drop-shadow(0 0 20px rgba(0,136,204,0.3));
            transition: all 0.3s ease;
        }
        .link-btn.telegram-link:hover {
            transform: translateY(-3px) scale(1.08);
            filter: drop-shadow(0 0 40px rgba(0,136,204,0.5));
        }
        .link-btn.telegram-link i {
            font-size: 48px;
        }

        /* Diğer linkler için arka plan ve kenarlık yok */
        .link-btn:not(.telegram-link) {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }
        .link-btn:not(.telegram-link):hover {
            transform: translateY(-3px) scale(1.08);
        }

        .link-btn.glow-border {
            box-shadow: none !important;
        }
        .link-btn.glow-active {
            animation: none !important;
        }
        
        .link-icon { line-height: 1; }
        .no-links-text { opacity: 0.5; font-size: 13px; }

        /* MÜZİK ÇALAR */
        .music-player {
            margin-top: 18px; border-radius: 16px; padding: 14px 18px;
            display: flex; align-items: center; gap: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            animation: fadeInUp 1s ease;
            background: rgba(20,20,20,0.92);
            flex-wrap: wrap;
            transition: background 0.3s, backdrop-filter 0.3s, border 0.3s;
        }
        .music-player.hidden { display: none; }
        .music-cover-wrap {
            position: relative; flex-shrink: 0;
        }
        .music-cover {
            width: 52px; height: 52px; object-fit: cover;
            border: 2px solid rgba(255,255,255,0.15);
            transition: all 0.3s;
        }
        .music-cover.round { border-radius: 50%; }
        .music-cover.square { border-radius: 8px; }
        .music-cover.spin { animation: spin 4s linear infinite; animation-play-state: paused; }
        .music-cover.spin.playing { animation-play-state: running; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .music-info { flex: 1; text-align: left; min-width: 80px; }
        .music-title { font-size: 13px; font-weight: 600; }
        .music-artist { font-size: 11px; color: #888; }

        .music-controls {
            display: flex; align-items: center; gap: 4px; flex-shrink: 0;
            background: rgba(255,255,255,0.04);
            padding: 4px 6px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .music-controls button {
            background: transparent;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            padding: 0;
        }
        .music-controls button svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.25s;
        }
        .music-controls button:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-2px) scale(1.05);
            color: #fff;
        }
        .music-controls button:active {
            transform: scale(0.92);
        }
        .music-controls button.play-btn {
            background: rgba(255,68,68,0.15);
            color: #ff4444;
            width: 42px;
            height: 42px;
            box-shadow: 0 0 20px rgba(255,68,68,0.1);
        }
        .music-controls button.play-btn svg {
            width: 22px;
            height: 22px;
        }
        .music-controls button.play-btn:hover {
            background: rgba(255,68,68,0.3);
            box-shadow: 0 0 30px rgba(255,68,68,0.2);
            color: #ff6666;
        }
        .music-controls button.play-btn.playing {
            background: rgba(68,255,68,0.15);
            color: #44ff44;
            box-shadow: 0 0 20px rgba(68,255,68,0.1);
        }
        .music-controls button.play-btn.playing:hover {
            background: rgba(68,255,68,0.3);
            box-shadow: 0 0 30px rgba(68,255,68,0.2);
            color: #66ff66;
        }

        .music-seek {
            flex: 1; min-width: 60px; height: 3px; -webkit-appearance: none;
            background: rgba(255,255,255,0.15); border-radius: 4px; outline: none;
            cursor: pointer;
        }
        .music-seek::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            border-radius: 50%; background: #ff4444; cursor: pointer;
            box-shadow: 0 0 10px rgba(255,68,68,0.3);
        }
        .music-seek::-moz-range-thumb {
            width: 12px; height: 12px; border-radius: 50%;
            background: #ff4444; cursor: pointer; border: none;
        }

        .view-count {
            position: fixed; left: 20px; bottom: 20px;
            display: flex; align-items: center; gap: 6px;
            background: transparent; padding: 8px 14px;
            border-radius: 20px; font-size: 13px; color: #999;
            z-index: 10;
            backdrop-filter: blur(4px);
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.04);
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .view-count .eye-3d {
            display: inline-block;
            font-size: 16px;
            filter: drop-shadow(0 2px 4px rgba(255,255,255,0.1));
            transform: perspective(200px) rotateY(-10deg) rotateX(5deg);
        }

        @media (max-width: 480px) {
            .profile-card { padding: 25px 18px 35px; }
            .name { font-size: 26px; }
            .avatar-wrapper, .avatar { width: 85px; height: 85px; }
            .avatar-ring { top: -3px; left: -3px; right: -3px; bottom: -3px; }
            .music-player { padding: 12px 14px; }
            .music-controls button { width: 30px; height: 30px; }
            .music-controls button svg { width: 16px; height: 16px; }
            .music-controls button.play-btn { width: 36px; height: 36px; }
            .music-controls button.play-btn svg { width: 18px; height: 18px; }
            .view-count { left: 12px; bottom: 12px; font-size: 11px; padding: 6px 12px; }
            .splash-logo { font-size: 38px; }
            .splash-click { padding: 10px 24px; font-size: 11px; }
            .link-btn.telegram-link {
                width: 60px;
                height: 60px;
                font-size: 36px;
            }
            .link-btn.telegram-link i {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- ============ GİRİŞ EKRANI - SADE ============ -->
    <div id="splashScreen" onclick="enterSite()">
        <div class="lightning-container">
            <div class="lightning"></div>
            <div class="lightning"></div>
            <div class="lightning"></div>
            <div class="lightning"></div>
            <div class="lightning"></div>
            <div class="lightning"></div>
            <div class="lightning"></div>
            <div class="lightning"></div>
            <div class="flash-overlay"></div>
        </div>
        
        <div class="splash-content">
            <div class="splash-logo">
                ROLEX
                <small>✦</small>
            </div>
            <div class="splash-click">click to join...</div>
            <div class="splash-sub">⚡ premium experience ⚡</div>
        </div>
    </div>

    <!-- ============ ANA SAYFA ============ -->
    <div class="bg-overlay" id="bgOverlay"></div>
    <div class="particles" id="particles"></div>
    <div class="container">
        <div class="profile-card" id="profileCard">
            <div class="avatar-wrapper">
                <div class="avatar-ring" id="avatarRing"></div>
                <img class="avatar" id="avatar" src="https://i.imgur.com/default.png" alt="Avatar">
                <div class="badge" id="badge">✓</div>
            </div>
            <div class="name-container">
                <span class="name-emoji" id="nameEmojiLeft"></span>
                <h1 class="name" id="nameDisplay">Yükleniyor...</h1>
                <span class="name-emoji" id="nameEmojiRight"></span>
            </div>
            <p class="bio-text" id="bioDisplay">Yükleniyor...</p>
            <div class="status-line hidden" id="statusLine">
                <span id="statusIcon"></span><span id="statusText"></span>
            </div>
            <div class="links" id="linksContainer"></div>
        </div>

        <div class="music-player hidden" id="musicPlayer">
            <div class="music-cover-wrap">
                <img class="music-cover round" id="musicCover" src="https://i.imgur.com/default.png" alt="cover">
            </div>
            <div class="music-info">
                <div class="music-title" id="musicTitle">Müzik</div>
                <div class="music-artist" id="musicArtist">Sanatçı</div>
            </div>
            <div class="music-controls">
                <button id="musicPrevBtn" title="Önceki">
                    <svg viewBox="0 0 24 24"><polygon points="19,20 9,12 19,4"/><rect x="5" y="4" width="2" height="16"/></svg>
                </button>
                <button class="play-btn" id="musicPlayBtn" title="Çal/Durdur">
                    <svg viewBox="0 0 24 24" id="playIcon"><polygon points="5,3 19,12 5,21"/></svg>
                </button>
                <button id="musicNextBtn" title="Sonraki">
                    <svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><rect x="17" y="4" width="2" height="16"/></svg>
                </button>
            </div>
            <input type="range" class="music-seek" id="musicSeek" min="0" max="100" value="0">
        </div>
    </div>

    <div class="view-count" id="viewCountWrap">
        <span class="eye-3d">👁</span>
        <span id="viewCount">0</span>
    </div>

    <audio id="bgMusic" loop style="display:none;"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNnqSKYVW_JMc4CO5KoNQb4ctrMdIMS6s",
            authDomain: "rolex-bio.firebaseapp.com",
            projectId: "rolex-bio",
            storageBucket: "rolex-bio.firebasestorage.app",
            messagingSenderId: "182739949955",
            appId: "1:182739949955:web:bd859e25ceee8936273eb6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let musicStarted = false;
        let splashScreen = document.getElementById('splashScreen');
        let audio = document.getElementById('bgMusic');
        let playBtn = document.getElementById('musicPlayBtn');
        let playIcon = document.getElementById('playIcon');
        let seekBar = document.getElementById('musicSeek');
        let isUserSeeking = false;

        function enterSite() {
            splashScreen.classList.add('hidden');
            if (audio.src && !musicStarted) {
                audio.play().then(() => {
                    musicStarted = true;
                    updatePlayIcon(true);
                }).catch(() => {});
            }
            sessionStorage.setItem('site_entered', 'true');
        }

        if (sessionStorage.getItem('site_entered') === 'true') {
            splashScreen.classList.add('hidden');
        }

        function updatePlayIcon(isPlaying) {
            if (isPlaying) {
                playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
                playBtn.classList.add('playing');
            } else {
                playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
                playBtn.classList.remove('playing');
            }
        }

        seekBar.addEventListener('input', () => {
            isUserSeeking = true;
            if (audio.duration) {
                audio.currentTime = (seekBar.value / 100) * audio.duration;
            }
        });
        seekBar.addEventListener('change', () => {
            isUserSeeking = false;
        });

        audio.addEventListener('timeupdate', () => {
            if (!isUserSeeking && audio.duration) {
                seekBar.value = (audio.currentTime / audio.duration) * 100;
            }
        });

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(() => {});
                updatePlayIcon(true);
            } else {
                audio.pause();
                updatePlayIcon(false);
            }
        });

        audio.addEventListener('play', () => {
            updatePlayIcon(true);
            document.getElementById('musicCover').classList.add('playing');
        });
        audio.addEventListener('pause', () => {
            updatePlayIcon(false);
            document.getElementById('musicCover').classList.remove('playing');
        });
        audio.addEventListener('ended', () => {
            updatePlayIcon(false);
            document.getElementById('musicCover').classList.remove('playing');
            seekBar.value = 0;
        });

        document.getElementById('musicPrevBtn').addEventListener('click', () => {
            audio.currentTime = 0;
        });

        function glowShadow(colorStr, intensity) {
            const gi = (intensity !== undefined && intensity !== null) ? intensity / 100 : 0;
            if (!gi) return 'none';
            const c = colorStr || '255,255,255';
            return `0 0 ${(gi * 14).toFixed(0)}px rgba(${c},${(gi * 0.85).toFixed(2)})`;
        }

        db.collection("bio").doc("profile").onSnapshot((doc) => {
            if (!doc.exists) return;
            const d = doc.data();

            document.getElementById('nameDisplay').textContent = d.name || 'İsimsiz';
            document.getElementById('nameDisplay').style.fontSize = (d.nameSize || 32) + 'px';

            const bioEl = document.getElementById('bioDisplay');
            bioEl.textContent = d.bio || '';
            bioEl.style.color = d.bioColor || '#aaaaaa';
            bioEl.style.textShadow = glowShadow(d.bioGlowColor, d.bioGlowIntensity);
            bioEl.style.fontSize = (d.bioSize || 14) + 'px';

            document.getElementById('avatar').src = d.avatar || 'https://i.imgur.com/default.png';

            const ring = document.getElementById('avatarRing');
            ring.className = 'avatar-ring';
            const ringSize = d.ringSize || 6;
            ring.style.borderWidth = ringSize + 'px';
            
            if (d.avatarEffect && d.avatarEffect !== 'none') {
                ring.classList.add('active', d.avatarEffect);
            }

            const el = document.getElementById('nameEmojiLeft');
            const er = document.getElementById('nameEmojiRight');
            const nameBadgeOn = d.nameBadge === true;
            const nameBadgePos = d.nameBadgePosition || 'right';
            const badgeIconVal = d.badgeIcon || '✓';
            const badgeColorVal = d.badgeColor || 'linear-gradient(135deg, #1da1f2, #0d8bd9)';
            const badgeHTML = `<span class="name-badge-3d" style="background:${badgeColorVal}">${badgeIconVal}</span>`;

            if (nameBadgeOn && nameBadgePos === 'left') {
                el.innerHTML = badgeHTML;
            } else {
                el.innerHTML = '';
                el.textContent = d.emojiLeft || '';
            }
            if (nameBadgeOn && nameBadgePos === 'right') {
                er.innerHTML = badgeHTML;
            } else {
                er.innerHTML = '';
                er.textContent = d.emojiRight || '';
            }
            el.className = 'name-emoji' + (d.emoji3d ? ' d3' : '');
            er.className = 'name-emoji' + (d.emoji3d ? ' d3' : '');

            document.title = (d.name || 'Bio') + ' | Bio';

            const badge = document.getElementById('badge');
            if (d.showBadge === false) badge.classList.add('hidden');
            else { badge.classList.remove('hidden');
                badge.textContent = d.badgeIcon || '✓';
                badge.style.background = d.badgeColor || 'linear-gradient(135deg, #1da1f2, #0d8bd9)'; }

            const cardOpacity = (d.cardOpacity !== undefined && d.cardOpacity !== null) ? d.cardOpacity : 0.88;
            const cardBlur = (d.cardBlur !== undefined && d.cardBlur !== null) ? d.cardBlur : 20;
            const card = document.getElementById('profileCard');
            if (cardOpacity === 0) {
                card.style.background = 'transparent';
                card.style.backdropFilter = 'none';
                card.style.webkitBackdropFilter = 'none';
                card.style.border = 'none';
            } else {
                card.style.background = `rgba(20,20,20,${cardOpacity})`;
                card.style.backdropFilter = `blur(${cardBlur}px)`;
                card.style.webkitBackdropFilter = `blur(${cardBlur}px)`;
                card.style.border = '1px solid rgba(255,255,255,0.1)';
            }

            const overlay = document.getElementById('bgOverlay');
            const overlayVal = (d.bgOverlay !== undefined && d.bgOverlay !== null) ? d.bgOverlay : 0;
            overlay.style.background = `rgba(0,0,0,${overlayVal / 100})`;

            const nameEl = document.getElementById('nameDisplay');
            nameEl.style.background = d.nameGradient || 'linear-gradient(135deg, #ffffff, #cccccc)';
            nameEl.style.webkitBackgroundClip = 'text';
            nameEl.style.webkitTextFillColor = 'transparent';
            nameEl.style.backgroundClip = 'text';
            nameEl.style.textShadow = d.nameGlow || 'none';
            nameEl.style.filter = d.nameNeon ? `drop-shadow(0 0 ${d.neonSize || 15}px ${d.neonColor || '#fff'})` : 'none';
            nameEl.style.fontFamily = d.nameFont || "'Segoe UI', system-ui, -apple-system, sans-serif";

            const statusLine = document.getElementById('statusLine');
            if (d.statusText) {
                statusLine.classList.remove('hidden');
                const iconSpan = document.getElementById('statusIcon');
                iconSpan.innerHTML = `
                    <svg class="status-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" fill="currentColor" />
                    </svg>
                `;
                document.getElementById('statusText').textContent = d.statusText;
                statusLine.style.color = d.statusColor || '#bbbbbb';
                statusLine.style.textShadow = glowShadow(d.statusGlowColor, d.statusGlowIntensity);
            } else {
                statusLine.classList.add('hidden');
            }

            document.body.style.background = d.bgImage ? `url(${d.bgImage}) center/cover no-repeat fixed` : (d.bgColor || '#0a0a0a');
            document.body.style.backgroundColor = d.bgColor || '#0a0a0a';

            const tgColor = d.telegramGlowColor || '0,136,204';
            const tgIntensity = (d.telegramGlowIntensity || 80) / 100;
            const tgSize = d.telegramSize || 72;

            const viewCountWrap = document.getElementById('viewCountWrap');
            viewCountWrap.style.color = d.viewColor || '#999999';
            viewCountWrap.style.textShadow = glowShadow(d.viewGlowColor, d.viewGlowIntensity);

            const pc = document.getElementById('particles');
            pc.innerHTML = '';
            if (d.particles !== false) {
                const count = d.particleCount || 50;
                const color = d.particleColor || 'rgba(255,255,255,0.5)';
                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div');
                    p.classList.add('particle');
                    p.style.left = Math.random() * 100 + '%';
                    p.style.animationDuration = (Math.random() * 10 + 5) + 's';
                    p.style.animationDelay = Math.random() * 5 + 's';
                    p.style.background = color;
                    pc.appendChild(p);
                }
            }

            const lc = document.getElementById('linksContainer');
            lc.innerHTML = '';
            if (d.links && d.links.length > 0) {
                d.links.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.title = link.title || '';
                    a.className = 'link-btn';
                    
                    // Telegram özel - büyük ve sade
                    if (link.brand === 'telegram') {
                        a.classList.add('telegram-link');
                        a.style.color = '#ffffff';
                        a.style.filter = `drop-shadow(0 0 ${20 + tgIntensity * 30}px rgba(${tgColor},${0.2 + tgIntensity * 0.4}))`;
                        a.style.fontSize = (tgSize * 0.65) + 'px';
                        a.style.width = tgSize + 'px';
                        a.style.height = tgSize + 'px';
                        // Telegram'a özel hover
                        a.onmouseenter = () => {
                            a.style.filter = `drop-shadow(0 0 ${40 + tgIntensity * 40}px rgba(${tgColor},${0.4 + tgIntensity * 0.5}))`;
                        };
                        a.onmouseleave = () => {
                            a.style.filter = `drop-shadow(0 0 ${20 + tgIntensity * 30}px rgba(${tgColor},${0.2 + tgIntensity * 0.4}))`;
                        };
                    } else {
                        // Diğer linkler - sadece ikon
                        a.style.fontSize = '28px';
                        a.style.color = 'rgba(255,255,255,0.5)';
                        a.onmouseenter = () => { a.style.color = '#fff'; };
                        a.onmouseleave = () => { a.style.color = 'rgba(255,255,255,0.5)'; };
                    }

                    const iconHTML = link.brand
                        ? `<i class="bi bi-${link.brand}"></i>`
                        : `<span class="link-icon">${link.icon || '🔗'}</span>`;
                    a.innerHTML = iconHTML;
                    lc.appendChild(a);
                });
            } else {
                lc.innerHTML = '<p class="no-links-text">Henüz link eklenmedi</p>';
            }

            // Müzik
            const mp = document.getElementById('musicPlayer');
            const cover = document.getElementById('musicCover');
            if (d.musicUrl) {
                mp.classList.remove('hidden');
                const musicOpacity = (d.musicOpacity !== undefined && d.musicOpacity !== null) ? d.musicOpacity : 0.92;
                const musicBlur = (d.musicBlur !== undefined && d.musicBlur !== null) ? d.musicBlur : 10;
                if (musicOpacity === 0) {
                    mp.style.background = 'transparent';
                    mp.style.backdropFilter = 'none';
                    mp.style.webkitBackdropFilter = 'none';
                    mp.style.border = 'none';
                } else {
                    mp.style.background = `rgba(20,20,20,${musicOpacity})`;
                    mp.style.backdropFilter = `blur(${musicBlur}px)`;
                    mp.style.webkitBackdropFilter = `blur(${musicBlur}px)`;
                    mp.style.border = '1px solid rgba(255,255,255,0.08)';
                }

                cover.className = 'music-cover';
                if (d.musicSquare) {
                    cover.classList.add('square');
                } else {
                    cover.classList.add('round');
                }
                if (d.musicSpin !== false) {
                    cover.classList.add('spin');
                }

                document.getElementById('musicTitle').textContent = d.musicTitle || 'Müzik';
                document.getElementById('musicArtist').textContent = d.musicArtist || '';
                cover.src = d.musicCover || 'https://i.imgur.com/default.png';

                if (audio.src !== d.musicUrl) {
                    audio.src = d.musicUrl;
                    audio.load();
                    if (sessionStorage.getItem('site_entered') === 'true' && d.musicAutoplay !== false) {
                        audio.play().then(() => {
                            musicStarted = true;
                            updatePlayIcon(true);
                        }).catch(() => {});
                    }
                }
            } else {
                mp.classList.add('hidden');
                audio.pause();
                audio.src = '';
                updatePlayIcon(false);
            }
        });

        const viewRef = db.collection("bio").doc("views");
        viewRef.get().then((doc) => {
            let count = doc.exists ? (doc.data().count || 0) : 0;
            count++;
            viewRef.set({ count: count });
            document.getElementById('viewCount').textContent = count;
            viewRef.onSnapshot((d) => {
                if (d.exists) document.getElementById('viewCount').textContent = d.data().count || 0;
            });
        });
    </script>
</body>
</html>
